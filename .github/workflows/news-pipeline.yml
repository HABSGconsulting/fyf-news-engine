name: FYF News Pipeline

on:
  schedule:
    - cron: '20 0 * * *'    # 05:50 AM IST
    - cron: '55 3 * * *'    # 09:25 AM IST
    - cron: '0 7 * * *'     # 12:30 PM IST
    - cron: '55 9 * * *'    # 03:25 PM IST
    - cron: '0 12 * * *'    # 05:30 PM IST
    - cron: '15 15 * * *'   # 08:45 PM IST
  workflow_dispatch:

concurrency:
  group: fyf-news-pipeline
  cancel-in-progress: false

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - name: Checkout engine repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate secrets
        run: |
          [ -z "${{ secrets.GEMINI_API_KEY }}" ] && { echo "GEMINI_API_KEY not set"; exit 1; } || true
          [ -z "${{ secrets.NEWS_SITE_DEPLOY_KEY }}" ] && { echo "NEWS_SITE_DEPLOY_KEY not set"; exit 1; } || true
          echo "All required secrets present"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run news pipeline
        id: pipeline
        timeout-minutes: 25
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CF_R2_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          CF_R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          CF_R2_BUCKET_NAME: ${{ secrets.CF_R2_BUCKET_NAME }}
          CF_R2_ENDPOINT_URL: ${{ secrets.CF_R2_ENDPOINT_URL }}
          NEWS_SITE_DEPLOY_KEY: ${{ secrets.NEWS_SITE_DEPLOY_KEY }}
          BLOG_SITE_DEPLOY_KEY: ${{ secrets.BLOG_SITE_DEPLOY_KEY }}
        run: python -m src.main

      - name: Commit run log
        if: always()
        run: |
          git config user.name "fyf-pipeline"
          git config user.email "pipeline@fundyourfreedom.in"
          git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git add data/run_log.json data/last_run.txt 2>/dev/null || git add data/run_log.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "log: pipeline run $(date -u +%Y-%m-%dT%H:%M:%SZ) [skip ci]"
          git push || true
