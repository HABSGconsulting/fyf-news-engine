name: FYF News Pipeline

on:
  schedule:
    - cron: '45 21 * * *'   # 03:15 AM IST  (was 05:45 AM)
    - cron: '45 23 * * *'   # 05:15 AM IST  (was 07:45 AM)
    - cron: '45 1  * * *'   # 07:15 AM IST  (was 09:45 AM)
    - cron: '45 3  * * *'   # 09:15 AM IST  (was 11:45 AM)
    - cron: '45 5  * * *'   # 11:15 AM IST  (was 01:45 PM)
    - cron: '45 7  * * *'   # 01:15 PM IST  (was 03:45 PM)
    - cron: '45 9  * * *'   # 03:15 PM IST  (was 05:45 PM)
    - cron: '45 11 * * *'   # 05:15 PM IST  (was 07:45 PM)
    - cron: '45 13 * * *'   # 07:15 PM IST  (was 09:45 PM)
    - cron: '45 15 * * *'   # 09:15 PM IST  (was 11:45 PM)
  workflow_dispatch:

concurrency:
  group: fyf-news-pipeline
  cancel-in-progress: false

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - name: Checkout engine repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate secrets
        run: |
          [ -z "${{ secrets.GEMINI_API_KEY }}" ]        && { echo "GEMINI_API_KEY not set";        exit 1; } || true
          [ -z "${{ secrets.NEWS_SITE_DEPLOY_KEY }}" ]  && { echo "NEWS_SITE_DEPLOY_KEY not set";  exit 1; } || true
          [ -z "${{ secrets.CF_KV_ACCOUNT_ID }}" ]      && { echo "CF_KV_ACCOUNT_ID not set — dedup will be skipped"; } || true
          [ -z "${{ secrets.CF_KV_NAMESPACE_ID }}" ]    && { echo "CF_KV_NAMESPACE_ID not set — dedup will be skipped"; } || true
          [ -z "${{ secrets.CF_KV_API_TOKEN }}" ]       && { echo "CF_KV_API_TOKEN not set — dedup will be skipped"; } || true
          [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ] && { echo "CLOUDFLARE_ACCOUNT_ID not set — learn links will be skipped"; } || true
          [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]  && { echo "CLOUDFLARE_API_TOKEN not set — learn links will be skipped"; } || true
          echo "Secrets validation complete"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run news pipeline
        id: pipeline
        timeout-minutes: 20
        env:
          GEMINI_API_KEY:              ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2:            ${{ secrets.GEMINI_API_KEY_2 }}
          CF_R2_ACCESS_KEY_ID:         ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          CF_R2_SECRET_ACCESS_KEY:     ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          CF_R2_BUCKET_NAME:           ${{ secrets.CF_R2_BUCKET_NAME }}
          CF_R2_ENDPOINT_URL:          ${{ secrets.CF_R2_ENDPOINT_URL }}
          NEWS_SITE_DEPLOY_KEY:        ${{ secrets.NEWS_SITE_DEPLOY_KEY }}
          BLOG_SITE_DEPLOY_KEY:        ${{ secrets.BLOG_SITE_DEPLOY_KEY }}
          CF_KV_ACCOUNT_ID:            ${{ secrets.CF_KV_ACCOUNT_ID }}
          CF_KV_NAMESPACE_ID:          ${{ secrets.CF_KV_NAMESPACE_ID }}
          CF_KV_API_TOKEN:             ${{ secrets.CF_KV_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID:       ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN:        ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_EMBEDDING_MODEL:  ${{ secrets.CLOUDFLARE_EMBEDDING_MODEL }}
        run: python -m src.main

      - name: Commit run log
        if: always()
        run: |
          git config user.name "fyf-pipeline"
          git config user.email "pipeline@fundyourfreedom.in"
          git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git fetch origin main
          git add data/run_log.json data/last_run.txt 2>/dev/null || git add data/run_log.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "log: pipeline run $(date -u +%Y-%m-%dT%H:%M:%SZ) [skip ci]"
          git push || true

      - name: Notify on failure
        if: failure()
        run: |
          echo "Pipeline failed at $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "Run URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
